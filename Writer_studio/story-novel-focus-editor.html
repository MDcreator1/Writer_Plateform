<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lekhak Manch - Focus Editor</title>
  <style>
    :root {
      color-scheme: light dark;
      --focus-shell-bg: #f4f8fb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--focus-shell-bg);
    }

    .focus-editor-shell {
      position: fixed;
      inset: 0;
      display: grid;
      background: var(--focus-shell-bg);
    }

    .focus-editor-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .focus-editor-fallback {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #637083;
    }

    .focus-editor-fallback a {
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body data-page="focus-editor">
  <main class="focus-editor-shell" aria-label="Lekhak Manch focus editor">
    <iframe
      id="focusEditorFrame"
      class="focus-editor-frame"
      title="Lekhak Manch Focus Editor"
      allow="clipboard-read; clipboard-write"
      referrerpolicy="same-origin">
    </iframe>
    <noscript>
      <p class="focus-editor-fallback">
        JavaScript is required for this focus shell. Open
        <a href="story-novel-project-editor.html?lmFocusPage=1">the focus editor</a>.
      </p>
    </noscript>
  </main>

  <script>
    (() => {
      const editorUrl = new URL('story-novel-project-editor.html', window.location.href);
      const incomingParams = new URLSearchParams(window.location.search);
      incomingParams.forEach((value, key) => {
        if (!['lmFocusPage', 'lmFocusShell'].includes(key)) editorUrl.searchParams.set(key, value);
      });
      editorUrl.searchParams.set('lmFocusPage', '1');
      editorUrl.searchParams.set('lmFocusShell', '1');
      document.getElementById('focusEditorFrame').src = editorUrl.href;
    })();
  </script>
</body>

</html>
